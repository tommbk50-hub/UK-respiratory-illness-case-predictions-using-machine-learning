name: Retry Pages Deploy

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

jobs:
  retry-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3 }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Retry failed Pages jobs
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun-failed-jobs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
